name: Full pipeline (Test, Windows App, macOS dmg, Release)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      release_notes:
        description: "Optional release notes (markdown). Defaults to auto-generated summary."
        required: false
        type: string

  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install
      - run: npm run type-check
      - name: Run tests with coverage
        run: npm run test -- --coverage --no-watchman --runInBand
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # Word versions of staff and admin (front desk) guides — parallel with build-app.
  build-docs:
    needs: ci-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Build .docx from Markdown
        run: npm run docs:docx
      - uses: actions/upload-artifact@v4
        with:
          name: guides-docx
          path: dist/docs/*.docx

  build-app:
    needs: ci-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install
      - name: Install web app deps and generate .svelte-kit
        run: cd apps/web && npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: apps/web/build/

  build-windows-app:
    needs: build-app
    runs-on: windows-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Download app build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: apps/web/build
      - name: Build Electron app
        run: npm run dist:ci
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_API_URL: ${{ secrets.SQUARE_API_URL }}
          SQUARE_API_VERSION: ${{ secrets.SQUARE_API_VERSION }}
          SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
          VITE_USE_MOCK_API: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # Two DMGs: arm64 (Apple Silicon, no Rosetta) and x64 (Intel Mac, or Apple Silicon with Rosetta).
  # A single "universal" dmg often leaves better-sqlite3 as one architecture only, which breaks under Rosetta.
  build-mac-app:
    needs: build-app
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Download app build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: apps/web/build
      - name: Build Electron (macOS dmg)
        run: npm run dist:mac:${{ matrix.arch }}:ci
        timeout-minutes: 45
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_API_URL: ${{ secrets.SQUARE_API_URL }}
          SQUARE_API_VERSION: ${{ secrets.SQUARE_API_VERSION }}
          SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
          VITE_USE_MOCK_API: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.arch }}
          path: dist/*.dmg

  smoke-test-windows-app:
    needs: build-windows-app
    runs-on: windows-latest
    env:
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_API_URL: ${{ secrets.SQUARE_API_URL }}
      SQUARE_API_VERSION: ${{ secrets.SQUARE_API_VERSION }}
      SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./installer
      - name: Find installer
        id: find_installer
        run: |
          $installers = Get-ChildItem -Path ./installer -Filter *.exe -File -ErrorAction SilentlyContinue
          if (-not $installers) { throw "No installer .exe in ./installer" }
          $installer = $installers | Where-Object { $_.Name -match 'Setup' } | Select-Object -First 1
          if (-not $installer) { $installer = $installers | Select-Object -First 1 }
          Write-Host "Using installer: $($installer.FullName)"
          echo "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
      - name: (Debug) Print installer path, user, and working directory
        run: |
          Write-Host "Installer path: ${{ steps.find_installer.outputs.installer_path }}"
          Write-Host "Current user: $env:USERNAME"
          Write-Host "Current directory: $(Get-Location)"
        shell: pwsh
      - name: Install app silently with log
        run: |
          # NSIS splits /D= on spaces if args are not passed as one token — use a no-space path for CI.
          $installDir = "$env:LOCALAPPDATA\Programs\FrontDeskApp"
          $installer = "${{ steps.find_installer.outputs.installer_path }}"
          Write-Host "About to run installer: $installer"
          Write-Host "Target directory: $installDir"
          $proc = Start-Process -FilePath $installer -ArgumentList @('/S', '/LOG=install.log', "/D=$installDir") -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if (Test-Path "install.log") { Get-Content "install.log" }
          if ($proc.ExitCode -ne 0) { throw "Installer failed with exit code $($proc.ExitCode)" }
        shell: pwsh
      - name: (Debug) List all files in workspace (max 40)
        run: |
          Get-ChildItem -Path . -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 40 FullName
        shell: pwsh
      - name: (Debug) List all files in temp directory (max 40)
        run: |
          Get-ChildItem -Path $env:TEMP -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 40 FullName
        shell: pwsh
      - name: Search for any .exe files in workspace and user profile (max 100)
        run: |
          Write-Host "Searching workspace..."
          Get-ChildItem -Path . -Recurse -Filter *.exe -File -ErrorAction SilentlyContinue | Select-Object -First 100 FullName
          Write-Host "Searching user profile..."
          Get-ChildItem -Path $env:USERPROFILE -Recurse -Filter *.exe -File -ErrorAction SilentlyContinue | Select-Object -First 100 FullName
        shell: pwsh
      - name: Find installed app executable
        id: find_exe
        run: |
          $programs = "$env:LOCALAPPDATA\Programs"
          $searchRoots = @(
            "$programs\FrontDeskApp",
            "$programs\Front Desk App",
            "$programs\Front",
            "$programs\front-desk-app",
            "${env:ProgramFiles}\Front Desk App",
            "${env:ProgramFiles}\Rec Center Check-in",
            "${env:ProgramFiles}\Rec Center Check-in\Front Desk App"
          )
          $pf86 = ${env:ProgramFiles(x86)}
          if ($pf86) {
            $searchRoots += "$pf86\Rec Center Check-in"
            $searchRoots += "$pf86\Rec Center Check-in\Front Desk App"
          }
          $candidates = @()
          foreach ($root in $searchRoots) {
            if (-not (Test-Path $root)) { continue }
            Write-Host "Searching: $root"
            $candidates += Get-ChildItem $root -Filter '*.exe' -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch '^(uninst|Uninstall|Setup|Update)' }
          }
          # Fallback: prior broken CI installs split /D= at the space -> Programs\Front\...
          if (-not $candidates -and (Test-Path $programs)) {
            Write-Host "Fallback search under: $programs"
            $candidates = Get-ChildItem $programs -Filter 'Front Desk App.exe' -Recurse -ErrorAction SilentlyContinue
          }
          $exe = $candidates | Where-Object { $_.Name -eq 'Front Desk App.exe' } | Select-Object -First 1
          if (-not $exe) { $exe = $candidates | Select-Object -First 1 }
          if (-not $exe) {
            Write-Host "Programs folder listing:"
            Get-ChildItem $programs -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
            Write-Host "All .exe under Programs (max 20):"
            Get-ChildItem $programs -Filter '*.exe' -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw "App executable not found. Searched: $($searchRoots -join '; ')"
          }
          Write-Host "Found executable: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Verify installed bundle (frontend + server next to .exe)
        run: |
          $exe = "${{ steps.find_exe.outputs.exe_path }}"
          $resources = Join-Path (Split-Path $exe -Parent) "resources"
          Write-Host "Verifying resources at: $resources"
          if (-not (Test-Path $resources)) { throw "Resources directory not found: $resources" }
          node src/server/scripts/verifyElectronPack.js --resources $resources
        shell: pwsh
      - name: Install Node deps for AppData DB verification
        run: npm install
      - name: Smoke test installed app (log readiness, AppData DB, no HTTP)
        run: |
          if (-not $env:SQUARE_ACCESS_TOKEN) { throw 'SQUARE_ACCESS_TOKEN secret is required for smoke test' }
          pwsh -File scripts/smoke-test-windows-installed.ps1 -ExePath "${{ steps.find_exe.outputs.exe_path }}"
        shell: pwsh

  # Manual dispatch on main only — requires bump/prerelease inputs from the operator.
  # PRs build and test but never release.
  release:
    needs:
      - smoke-test-windows-app
      - build-mac-app
      - build-docs
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BUMP: ${{ inputs.bump }}
      PRERELEASE: ${{ inputs.prerelease }}
      CUSTOM_NOTES: ${{ inputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            LATEST=$(node -p "require('./package.json').version")
            echo "No existing releases; starting from package.json version ${LATEST}"
          else
            echo "Latest release tag: ${LATEST}"
          fi

          LATEST="${LATEST#v}"
          IFS='.' read -r YEAR NUM PATCH <<< "$LATEST"

          if [ -z "$YEAR" ] || [ -z "$NUM" ] || [ -z "$PATCH" ]; then
            echo "Could not parse version '${LATEST}' (expected YYYY.N.P)"
            exit 1
          fi

          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) NUM=$((NUM + 1)); PATCH=0 ;;
            major) YEAR=$((YEAR + 1)); NUM=0; PATCH=0 ;;
            *)
              echo "Unknown bump type: ${BUMP}"
              exit 1
              ;;
          esac

          VERSION="${YEAR}.${NUM}.${PATCH}"
          TAG="v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${TAG} (${BUMP} bump)"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        id: assets
        run: |
          set -euo pipefail
          mkdir -p release-assets

          for dir in artifacts/windows-installer artifacts/mac-dmg-arm64 artifacts/mac-dmg-x64 artifacts/guides-docx; do
            if [ -d "$dir" ]; then
              find "$dir" -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.docx' \) -exec cp {} release-assets/ \;
            fi
          done

          EXE_COUNT=$(find release-assets -maxdepth 1 -name '*.exe' | wc -l | tr -d ' ')
          DMG_COUNT=$(find release-assets -maxdepth 1 -name '*.dmg' | wc -l | tr -d ' ')
          DOCX_COUNT=$(find release-assets -maxdepth 1 -name '*.docx' | wc -l | tr -d ' ')

          if [ "$EXE_COUNT" -eq 0 ] || [ "$DMG_COUNT" -eq 0 ]; then
            echo "Missing required installers (exe=${EXE_COUNT}, dmg=${DMG_COUNT})"
            ls -laR artifacts || true
            exit 1
          fi

          echo "Collected ${EXE_COUNT} Windows installer(s), ${DMG_COUNT} macOS DMG(s), ${DOCX_COUNT} guide(s)"
          ls -la release-assets/

          {
            echo "exe_count=${EXE_COUNT}"
            echo "dmg_count=${DMG_COUNT}"
            echo "docx_count=${DOCX_COUNT}"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          EXE_COUNT: ${{ steps.assets.outputs.exe_count }}
          DMG_COUNT: ${{ steps.assets.outputs.dmg_count }}
          DOCX_COUNT: ${{ steps.assets.outputs.docx_count }}
        run: |
          set -euo pipefail
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          HEAD_MESSAGE=$(git log -1 --format=%B "${HEAD_SHA}")

          if [ -n "$CUSTOM_NOTES" ]; then
            printf '%s\n' "$CUSTOM_NOTES" > release-notes.md
          else
            {
              echo "## Front Desk App ${TAG}"
              echo ""
              echo "**Bump type:** ${BUMP}"
              echo ""
              echo "**Pipeline run:** [${RUN_ID}](${RUN_URL})"
              echo ""
              echo "**Commit:** [\`${HEAD_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${HEAD_SHA})"
              echo ""
              echo "${HEAD_MESSAGE}"
              echo ""
              echo "### Assets"
              echo ""
              echo "- Windows installer (${EXE_COUNT})"
              echo "- macOS DMG — Apple Silicon and Intel (${DMG_COUNT})"
              echo "- Staff and admin Word guides (${DOCX_COUNT})"
            } > release-notes.md
          fi

      - name: Create tag on commit
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Release ${TAG}"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ARGS=(
            release create "$TAG"
            --target "$GITHUB_SHA"
            --title "Front Desk App v${VERSION}"
            --notes-file release-notes.md
          )
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh "${ARGS[@]}" release-assets/*

      - name: Publish summary
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "## Release published: ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Bump | \`${BUMP}\` |"
            echo "| Commit | [\`${GITHUB_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
            echo "| Pipeline run | [${GITHUB_RUN_ID}](${RUN_URL}) |"
            echo "| Release | [${TAG}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}) |"
          } >> "$GITHUB_STEP_SUMMARY"
