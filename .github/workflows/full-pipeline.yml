name: Full pipeline (Test, Windows App, macOS dmg, Release)

on:
  workflow_dispatch:

  pull_request:
      branches:
        - main

jobs:
  ci-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install
      - run: npm run type-check
      - name: Run tests with coverage
        run: npm run test -- --coverage --no-watchman --runInBand
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # Word versions of staff and admin (front desk) guides — parallel with build-app.
  build-docs:
    needs: ci-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Build .docx from Markdown
        run: npm run docs:docx
      - uses: actions/upload-artifact@v4
        with:
          name: guides-docx
          path: dist/docs/*.docx

  build-app:
    needs: ci-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install
      - name: Install web app deps and generate .svelte-kit
        run: cd apps/web && npm install
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: apps/web/build/

  build-windows-app:
    needs: build-app
    runs-on: windows-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Download app build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: apps/web/build
      - name: Build Electron app
        run: npm run dist:ci
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_API_URL: ${{ secrets.SQUARE_API_URL }}
          SQUARE_API_VERSION: ${{ secrets.SQUARE_API_VERSION }}
          SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
          VITE_USE_MOCK_API: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # Two DMGs: arm64 (Apple Silicon, no Rosetta) and x64 (Intel Mac, or Apple Silicon with Rosetta).
  # A single "universal" dmg often leaves better-sqlite3 as one architecture only, which breaks under Rosetta.
  build-mac-app:
    needs: build-app
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Download app build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: apps/web/build
      - name: Build Electron (macOS dmg)
        run: npm run dist:mac:${{ matrix.arch }}:ci
        timeout-minutes: 45
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_API_URL: ${{ secrets.SQUARE_API_URL }}
          SQUARE_API_VERSION: ${{ secrets.SQUARE_API_VERSION }}
          SQUARE_ENVIRONMENT: ${{ secrets.SQUARE_ENVIRONMENT }}
          VITE_USE_MOCK_API: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.arch }}
          path: dist/*.dmg

  smoke-test-windows-app:
    needs: build-windows-app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./installer
      - name: Set required environment variables
        run: |
          [System.Environment]::SetEnvironmentVariable('SQUARE_ACCESS_TOKEN', '${{ secrets.SQUARE_ACCESS_TOKEN }}', 'User')
          [System.Environment]::SetEnvironmentVariable('SQUARE_API_URL', '${{ secrets.SQUARE_API_URL }}', 'User')
          [System.Environment]::SetEnvironmentVariable('SQUARE_API_VERSION', '${{ secrets.SQUARE_API_VERSION }}', 'User')
          [System.Environment]::SetEnvironmentVariable('SQUARE_ENVIRONMENT', '${{ secrets.SQUARE_ENVIRONMENT }}', 'User')
          [System.Environment]::SetEnvironmentVariable('VITE_USE_MOCK_API', 'false', 'User')
        shell: pwsh
      - name: Find installer
        id: find_installer
        run: |
          $installers = Get-ChildItem -Path ./installer -Filter *.exe -File -ErrorAction SilentlyContinue
          if (-not $installers) { throw "No installer .exe in ./installer" }
          $installer = $installers | Where-Object { $_.Name -match 'Setup' } | Select-Object -First 1
          if (-not $installer) { $installer = $installers | Select-Object -First 1 }
          Write-Host "Using installer: $($installer.FullName)"
          echo "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
      - name: (Debug) Print installer path, user, and working directory
        run: |
          Write-Host "Installer path: ${{ steps.find_installer.outputs.installer_path }}"
          Write-Host "Current user: $env:USERNAME"
          Write-Host "Current directory: $(Get-Location)"
        shell: pwsh
      - name: Install app silently with log
        run: |
          $installDir = "$env:LOCALAPPDATA\Programs\Front Desk App"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          $installer = "${{ steps.find_installer.outputs.installer_path }}"
          Write-Host "About to run installer: $installer"
          Write-Host "Target directory: $installDir"
          # /D= must be last (NSIS). Separate args so paths with spaces parse correctly.
          $proc = Start-Process -FilePath $installer -ArgumentList @('/S', '/LOG=install.log', "/D=$installDir") -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if (Test-Path "install.log") { Get-Content "install.log" }
          if ($proc.ExitCode -ne 0) { throw "Installer failed with exit code $($proc.ExitCode)" }
        shell: pwsh
      - name: (Debug) List all files in workspace (max 40)
        run: |
          Get-ChildItem -Path . -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 40 FullName
        shell: pwsh
      - name: (Debug) List all files in temp directory (max 40)
        run: |
          Get-ChildItem -Path $env:TEMP -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 40 FullName
        shell: pwsh
      - name: Search for any .exe files in workspace and user profile (max 100)
        run: |
          Write-Host "Searching workspace..."
          Get-ChildItem -Path . -Recurse -Filter *.exe -File -ErrorAction SilentlyContinue | Select-Object -First 100 FullName
          Write-Host "Searching user profile..."
          Get-ChildItem -Path $env:USERPROFILE -Recurse -Filter *.exe -File -ErrorAction SilentlyContinue | Select-Object -First 100 FullName
        shell: pwsh
      - name: Find installed app executable
        id: find_exe
        run: |
          $searchRoots = @(
            "$env:LOCALAPPDATA\Programs\Front Desk App",
            "$env:LOCALAPPDATA\Programs\front-desk-app",
            "${env:ProgramFiles}\Front Desk App",
            "${env:ProgramFiles}\Rec Center Check-in",
            "${env:ProgramFiles}\Rec Center Check-in\Front Desk App"
          )
          $pf86 = ${env:ProgramFiles(x86)}
          if ($pf86) {
            $searchRoots += "$pf86\Rec Center Check-in"
            $searchRoots += "$pf86\Rec Center Check-in\Front Desk App"
          }
          $candidates = @()
          foreach ($root in $searchRoots) {
            if (-not (Test-Path $root)) { continue }
            Write-Host "Searching: $root"
            $candidates += Get-ChildItem $root -Filter '*.exe' -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch '^(uninst|Uninstall|Setup|Update)' }
          }
          $exe = $candidates | Where-Object { $_.Name -eq 'Front Desk App.exe' } | Select-Object -First 1
          if (-not $exe) { $exe = $candidates | Select-Object -First 1 }
          if (-not $exe) {
            Write-Host "Programs folder listing:"
            Get-ChildItem "$env:LOCALAPPDATA\Programs" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw "App executable not found. Searched: $($searchRoots -join '; ')"
          }
          Write-Host "Found executable: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Verify installed bundle (frontend + server next to .exe)
        run: |
          $exe = "${{ steps.find_exe.outputs.exe_path }}"
          $resources = Join-Path (Split-Path $exe -Parent) "resources"
          Write-Host "Verifying resources at: $resources"
          if (-not (Test-Path $resources)) { throw "Resources directory not found: $resources" }
          node src/server/scripts/verifyElectronPack.js --resources $resources
        shell: pwsh
      - name: Run app and check it starts
        run: |
          Start-Process -FilePath "${{ steps.find_exe.outputs.exe_path }}"
          Start-Sleep -Seconds 10
          $processName = [System.IO.Path]::GetFileNameWithoutExtension("${{ steps.find_exe.outputs.exe_path }}")
          $process = Get-Process $processName -ErrorAction SilentlyContinue
          if ($null -eq $process) { throw "App did not start" }
        shell: pwsh
      - name: Kill app
        run: |
          $processName = [System.IO.Path]::GetFileNameWithoutExtension("${{ steps.find_exe.outputs.exe_path }}")
          Stop-Process -Name $processName -Force
        shell: pwsh
      # - name: Check for 'server is running' log line and absence of fatal errors
      #   run: |
      #     $userDir = "$env:LOCALAPPDATA\Programs\Front Desk App"
      #     # Look for server.log or app.log
      #     $logFile = Get-ChildItem $userDir -Filter server.log -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
