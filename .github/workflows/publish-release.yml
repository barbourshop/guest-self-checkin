name: Publish release

on:
  workflow_dispatch:
    inputs:
      pipeline_run_id:
        description: "Full pipeline run ID (leave blank = latest successful run on main)"
        required: false
        type: string
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      release_notes:
        description: "Optional release notes (markdown). Defaults to auto-generated summary."
        required: false
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve and validate pipeline run
        id: resolve
        env:
          PIPELINE_RUN_ID: ${{ inputs.pipeline_run_id }}
        run: |
          set -euo pipefail

          if [ -n "$PIPELINE_RUN_ID" ]; then
            RUN_ID="$PIPELINE_RUN_ID"
          else
            RUN_ID=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/full-pipeline.yml/runs?branch=main&status=success&per_page=1" \
              --jq '.workflow_runs[0].id')
            if [ "$RUN_ID" = "null" ] || [ -z "$RUN_ID" ]; then
              echo "No successful full-pipeline run found on main"
              exit 1
            fi
          fi

          RUN_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}")

          CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion')
          HEAD_BRANCH=$(echo "$RUN_JSON" | jq -r '.head_branch')
          HEAD_SHA=$(echo "$RUN_JSON" | jq -r '.head_sha')
          HEAD_MESSAGE=$(echo "$RUN_JSON" | jq -r '.head_commit.message')
          RUN_URL=$(echo "$RUN_JSON" | jq -r '.html_url')
          WORKFLOW_PATH=$(echo "$RUN_JSON" | jq -r '.path')

          if [ "$WORKFLOW_PATH" != ".github/workflows/full-pipeline.yml" ]; then
            echo "Run ${RUN_ID} is not from full-pipeline.yml (path: ${WORKFLOW_PATH})"
            exit 1
          fi

          if [ "$CONCLUSION" != "success" ]; then
            echo "Run ${RUN_ID} did not succeed (conclusion: ${CONCLUSION})"
            exit 1
          fi

          if [ "$HEAD_BRANCH" != "main" ]; then
            echo "Run ${RUN_ID} is not on main (branch: ${HEAD_BRANCH})"
            exit 1
          fi

          JOBS=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs")

          check_job() {
            local name="$1"
            local status
            status=$(echo "$JOBS" | jq -r --arg n "$name" '.jobs[] | select(.name == $n) | .conclusion' | head -1)
            if [ "$status" != "success" ]; then
              echo "Required job '${name}' did not succeed (conclusion: ${status:-missing})"
              exit 1
            fi
          }

          check_job "build-windows-app"
          check_job "build-docs"

          MAC_SUCCESS=$(echo "$JOBS" | jq -r '.jobs[] | select(.name | startswith("build-mac-app")) | .conclusion' | grep -c success || true)
          if [ "$MAC_SUCCESS" -lt 2 ]; then
            echo "Expected both macOS builds (arm64 and x64) to succeed, got ${MAC_SUCCESS} successful build-mac-app jobs"
            exit 1
          fi

          {
            echo "run_id=${RUN_ID}"
            echo "head_sha=${HEAD_SHA}"
            echo "run_url=${RUN_URL}"
            echo "head_message<<EOF"
            echo "$HEAD_MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved pipeline run ${RUN_ID} at ${HEAD_SHA} (${RUN_URL})"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          LATEST=$(gh release list --limit 1 --json tagName -q '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            LATEST=$(node -p "require('./package.json').version")
            echo "No existing releases; starting from package.json version ${LATEST}"
          else
            echo "Latest release tag: ${LATEST}"
          fi

          LATEST="${LATEST#v}"
          IFS='.' read -r YEAR NUM PATCH <<< "$LATEST"

          if [ -z "$YEAR" ] || [ -z "$NUM" ] || [ -z "$PATCH" ]; then
            echo "Could not parse version '${LATEST}' (expected YYYY.N.P)"
            exit 1
          fi

          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) NUM=$((NUM + 1)); PATCH=0 ;;
            major) YEAR=$((YEAR + 1)); NUM=0; PATCH=0 ;;
            *)
              echo "Unknown bump type: ${BUMP}"
              exit 1
              ;;
          esac

          VERSION="${YEAR}.${NUM}.${PATCH}"
          TAG="v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${TAG} (${BUMP} bump)"

      - name: Download artifacts from pipeline run
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve.outputs.run_id }}
          path: artifacts

      - name: Collect release assets
        id: assets
        run: |
          set -euo pipefail
          mkdir -p release-assets

          for dir in artifacts/windows-installer artifacts/mac-dmg-arm64 artifacts/mac-dmg-x64 artifacts/guides-docx; do
            if [ -d "$dir" ]; then
              find "$dir" -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.docx' \) -exec cp {} release-assets/ \;
            fi
          done

          EXE_COUNT=$(find release-assets -maxdepth 1 -name '*.exe' | wc -l | tr -d ' ')
          DMG_COUNT=$(find release-assets -maxdepth 1 -name '*.dmg' | wc -l | tr -d ' ')
          DOCX_COUNT=$(find release-assets -maxdepth 1 -name '*.docx' | wc -l | tr -d ' ')

          if [ "$EXE_COUNT" -eq 0 ] || [ "$DMG_COUNT" -eq 0 ]; then
            echo "Missing required installers (exe=${EXE_COUNT}, dmg=${DMG_COUNT})"
            ls -laR artifacts || true
            exit 1
          fi

          echo "Collected ${EXE_COUNT} Windows installer(s), ${DMG_COUNT} macOS DMG(s), ${DOCX_COUNT} guide(s)"
          ls -la release-assets/

          {
            echo "exe_count=${EXE_COUNT}"
            echo "dmg_count=${DMG_COUNT}"
            echo "docx_count=${DOCX_COUNT}"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          BUMP: ${{ inputs.bump }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          RUN_URL: ${{ steps.resolve.outputs.run_url }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          HEAD_MESSAGE: ${{ steps.resolve.outputs.head_message }}
          CUSTOM_NOTES: ${{ inputs.release_notes }}
          EXE_COUNT: ${{ steps.assets.outputs.exe_count }}
          DMG_COUNT: ${{ steps.assets.outputs.dmg_count }}
          DOCX_COUNT: ${{ steps.assets.outputs.docx_count }}
        run: |
          set -euo pipefail

          if [ -n "$CUSTOM_NOTES" ]; then
            printf '%s\n' "$CUSTOM_NOTES" > release-notes.md
          else
            {
              echo "## Front Desk App ${TAG}"
              echo ""
              echo "**Bump type:** ${BUMP}"
              echo ""
              echo "**Pipeline run:** [${RUN_ID}](${RUN_URL})"
              echo ""
              echo "**Commit:** [\`${HEAD_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${HEAD_SHA})"
              echo ""
              echo "${HEAD_MESSAGE}"
              echo ""
              echo "### Assets"
              echo ""
              echo "- Windows installer (${EXE_COUNT})"
              echo "- macOS DMG — Apple Silicon and Intel (${DMG_COUNT})"
              echo "- Staff and admin Word guides (${DOCX_COUNT})"
            } > release-notes.md
          fi

      - name: Create tag on pipeline commit
        env:
          TAG: ${{ steps.version.outputs.tag }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$HEAD_SHA" -m "Release ${TAG}"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          ARGS=(
            release create "$TAG"
            --target "$HEAD_SHA"
            --title "Front Desk App v${VERSION}"
            --notes-file release-notes.md
          )
          if [ "$PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi
          gh "${ARGS[@]}" release-assets/*

      - name: Publish summary
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          BUMP: ${{ inputs.bump }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          RUN_URL: ${{ steps.resolve.outputs.run_url }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          {
            echo "## Release published: ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Bump | \`${BUMP}\` |"
            echo "| Commit | [\`${HEAD_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${HEAD_SHA}) |"
            echo "| Pipeline run | [${RUN_ID}](${RUN_URL}) |"
            echo "| Release | [${TAG}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}) |"
          } >> "$GITHUB_STEP_SUMMARY"
